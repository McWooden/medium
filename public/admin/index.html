<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- add marked.js to manually parse raw markdown into html -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewTemplate("articles", createClass({
      render: function () {
        var entry = this.props.entry;
        var categories = entry.getIn(['data', 'categories']);

        // Fetch raw markdown string instead of using the broken widgetFor
        var rawBody = entry.getIn(['data', 'body']) || '';

        // Parse the markdown string into HTML using marked.js
        var htmlBody = window.marked ? window.marked.parse(rawBody) : rawBody;

        // Add responsive CSS for markdown elements (images, iframes, etc.)
        var responsiveCss = '<style>img, iframe { max-width: 100%; height: auto; border-radius: 8px; margin: 1.5rem 0; clear: both; display: block; } pre { max-width: 100%; overflow-x: auto; }</style>';
        htmlBody = responsiveCss + htmlBody;

        return h('div', { style: { padding: '20px', fontFamily: 'ui-sans-serif, system-ui, sans-serif', maxWidth: '740px', margin: '0 auto' } },
          h('div', { style: { color: '#6b7280', marginBottom: '8px', fontSize: '13px', textTransform: 'uppercase', letterSpacing: '0.05em' } },
            categories ? categories.toJS().join(' · ') : ''
          ),
          h('div', {
            style: {
              lineHeight: '1.75',
              color: '#374151',
              fontSize: '1.125rem'
            },
            // Safely inject the parsed HTML into the div
            dangerouslySetInnerHTML: { __html: htmlBody || '<p style="color:#9ca3af;font-style:italic;">Start writing to see the preview...</p>' }
          })
        );
      }
    }));
  </script>
</body>

</html>
