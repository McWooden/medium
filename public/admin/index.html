<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerPreviewTemplate("articles", createClass({
      render: function () {
        var entry = this.props.entry;
        var body = this.props.widgetFor('body');
        var categories = entry.getIn(['data', 'categories']);

        return h('div', { style: { padding: '20px', fontFamily: 'ui-sans-serif, system-ui, sans-serif', maxWidth: '740px', margin: '0 auto' } },
          h('div', { style: { color: '#6b7280', marginBottom: '8px', fontSize: '13px', textTransform: 'uppercase', letterSpacing: '0.05em' } },
            categories ? categories.toJS().join(' · ') : ''
          ),
          h('div', {
            style: {
              lineHeight: '1.75',
              color: '#374151',
              fontSize: '1.125rem'
            }
          },
            body || h('p', { style: { color: '#9ca3af', fontStyle: 'italic' } }, 'Start writing to see the preview...')
          )
        );
      }
    }));
  </script>
</body>

</html>
